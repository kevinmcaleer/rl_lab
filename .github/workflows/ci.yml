# CI pipeline for the Buddy Jr RL Lab.
#
# Two jobs:
#   * quality   — lint (ruff), format (black), types (mypy), tests (pytest)
#                 across macOS + Ubuntu on Python 3.10/3.11/3.12. Installs the
#                 base package + [dev] extras, which are 100% pip-installable on
#                 every platform (the physics backend is an optional extra).
#   * sim-smoke — installs the [sim] extra (pybullet) on Ubuntu, where a
#                 manylinux wheel exists, and runs the headless URDF load test.
#
# pybullet is intentionally NOT in the cross-platform matrix: it has no macOS
# arm64 wheel and its source build fails on recent Xcode. The pure-Python URDF
# checks still run everywhere (pytest skips the pybullet-specific load when the
# wheel is unavailable), so macOS coverage stays meaningful.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same ref so fast-follow pushes don't
# queue up and waste minutes on already-superseded code.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: "quality / ${{ matrix.os }} / py${{ matrix.python-version }}"
    strategy:
      fail-fast: false   # surface all OS/version failures in one pass
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Installs the base package + [dev] tooling. This also verifies the
      # epic's "fresh clone installs with pip install -e .[dev]" criterion on
      # both platforms (no native compilation required).
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install rl-lab with dev extras
        run: pip install -e ".[dev]"

      - name: ruff check (lint)
        run: ruff check .

      # black is the formatter of record (see .pre-commit-config.yaml and
      # [tool.black]); --check is read-only.
      - name: black --check (format)
        run: black --check .

      - name: mypy (type check rl_lab)
        run: mypy rl_lab

      # The pybullet load test self-skips when the wheel is unavailable
      # (importorskip), so this is meaningful on macOS too.
      - name: pytest
        run: pytest -q

  sim-smoke:
    name: "sim-smoke / ubuntu / py3.12"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      # The [sim] extra adds pybullet (manylinux wheel on Linux); [dev] adds
      # pytest so the PyBullet-only backend tests actually run here.
      - name: Install rl-lab with the sim + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[sim,dev]"

      # Headless URDF smoke test in DIRECT (no-display) mode — exercises the
      # real PyBullet load path that macOS runners cannot build.
      - name: Validate buddy_jr.urdf (headless PyBullet)
        run: python scripts/validate_urdf.py

      # Full test suite with PyBullet present: the backend tests (which
      # importorskip pybullet and are skipped in the quality job) run for real
      # here and cross-check the backend against the analytic kinematics.
      - name: pytest (with PyBullet backend)
        run: pytest -q
