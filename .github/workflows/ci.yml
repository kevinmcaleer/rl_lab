# CI pipeline for the Buddy Jr RL Lab.
# Runs lint (ruff), type-checking (mypy), tests (pytest), and a headless
# PyBullet URDF smoke test on every push to main and on pull requests.
# macOS and Ubuntu are both covered so learners on either platform can
# trust the codebase before diving into experiments.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same ref so fast-follow pushes don't
# queue up and waste minutes on already-superseded code.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "test / ${{ matrix.os }} / py${{ matrix.python-version }}"
    strategy:
      fail-fast: false   # surface all OS/version failures in one pass
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      # ------------------------------------------------------------------ #
      # 1. Source checkout
      # ------------------------------------------------------------------ #
      - name: Checkout source
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Python setup + pip cache
      #    Caching the pip download cache speeds up repeated runs noticeably
      #    on both Ubuntu and macOS runners.
      # ------------------------------------------------------------------ #
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # ------------------------------------------------------------------ #
      # 3. Install the package + dev extras
      #    [dev] pulls in: pytest, ruff, mypy, mkdocs-material
      # ------------------------------------------------------------------ #
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install rl-lab with dev extras
        run: pip install -e .[dev]

      # ------------------------------------------------------------------ #
      # 4. Lint — ruff check catches errors, style, and import hygiene
      # ------------------------------------------------------------------ #
      - name: ruff check (lint)
        run: ruff check .

      # ------------------------------------------------------------------ #
      # 5. Format check — black is the formatter of record (see .pre-commit
      #    -config.yaml and [tool.black]); --check is read-only.
      # ------------------------------------------------------------------ #
      - name: black --check (format)
        run: black --check .

      # ------------------------------------------------------------------ #
      # 6. Type checking — mypy on the main package
      #    Strict checking is progressive: the package is young, so we start
      #    permissive and tighten per-module as each issue is resolved.
      # ------------------------------------------------------------------ #
      - name: mypy (type check rl_lab)
        run: mypy rl_lab

      # ------------------------------------------------------------------ #
      # 7. Unit + integration tests
      # ------------------------------------------------------------------ #
      - name: pytest
        run: pytest -q

      # ------------------------------------------------------------------ #
      # 8. Headless URDF smoke test via PyBullet
      #    Runs in DIRECT (no-display) mode — no X server or virtual
      #    framebuffer required.  The script is provided by issue #12.
      # ------------------------------------------------------------------ #
      - name: Validate buddy_jr.urdf (headless PyBullet)
        run: python scripts/validate_urdf.py
