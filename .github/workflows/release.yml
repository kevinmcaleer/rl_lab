# Release workflow for the Buddy Jr RL Lab.
#
# Triggered by pushing a version tag (v*).  Two jobs:
#
#   build   — checks out the source, builds an sdist + wheel with
#             'python -m build', and uploads both as a workflow artifact.
#
#   publish — downloads the artifact and pushes it to PyPI using the
#             PyPA gh-action-pypi-publish action with trusted publishing
#             (OpenID Connect, no API token required).  PyPI must be
#             configured with a "pending publisher" or a saved publisher
#             pointing at this repository and the 'pypi' environment.
#
# Trusted publishing setup (one-time, on PyPI):
#   https://docs.pypi.org/trusted-publishers/adding-a-publisher/
#   Owner: kevinmcaleer, repo: rl_lab, workflow: release.yml, env: pypi
name: Release

on:
  push:
    tags:
      - "v*"          # v0.1.0, v1.2.3, v2.0.0-rc1, etc.

# Prevent concurrent releases from colliding.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel an in-flight publish

permissions:
  contents: read            # checkout only

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Build sdist + wheel
  # ---------------------------------------------------------------------------
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          # Fetch the full history so setuptools-scm / git describe works if
          # the project ever adopts dynamic versioning.  Harmless otherwise.
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build frontend
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build
        # Produces dist/rl_lab-<version>-py3-none-any.whl
        #      and dist/rl_lab-<version>.tar.gz

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 5

  # ---------------------------------------------------------------------------
  # Job 2 — Publish to PyPI via trusted publishing (OIDC, no token)
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    # The 'pypi' GitHub Actions environment gates the deployment.
    # Configure it at: Settings > Environments > pypi
    # (add required reviewers, branch / tag protection rules as desired).
    environment:
      name: pypi
      url: https://pypi.org/p/rl-lab

    permissions:
      id-token: write     # REQUIRED for OIDC trusted publishing

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No 'password' or 'token' needed — OIDC handles authentication.
        # For test runs, uncomment the next two lines and point a trusted
        # publisher at TestPyPI instead:
        # with:
        #   repository-url: https://test.pypi.org/legacy/
