name: Feature Request
description: Propose a new feature or enhancement
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an enhancement! Help us understand what you'd like to see added or improved.

  - type: input
    id: title
    attributes:
      label: Summary
      description: A short title for this feature
      placeholder: e.g., Add SAC algorithm wrapper, or Support MuJoCo physics backend
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: |
        Describe the problem you're trying to solve, or the use case this would enable.
      placeholder: |
        When training policies on Buddy Jr, I want to compare PPO and SAC on the same task.
        Currently only PPO is wrapped; SAC is available through Stable-Baselines3 but not
        integrated into the rl_lab training pipeline.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        Describe your idea for a solution. How would you like to see this implemented?
      placeholder: |
        Add a `rl_lab.algos.sac.SACPolicy` class that wraps SB3's SAC,
        analogous to the existing PPO wrapper, so users can run
        `rl-lab train --algo sac --env BuddyJrReach-v0`
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there other ways to solve this?
      placeholder: Users could import Stable-Baselines3 directly, but the lab's wrapper approach is more discoverable.
    validations:
      required: false

  - type: textarea
    id: learner_impact
    attributes:
      label: Impact on learning
      description: |
        How does this help learners understand RL better? What experiment or ladder rung would benefit?
      placeholder: |
        Experiment 10 (SAC + the full aim task) would no longer require custom SB3 setup.
        Learners could compare off-policy vs. on-policy algorithms side-by-side.
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: This is not a duplicate of an existing feature request
          required: true
        - label: This aligns with the rl_lab teaching mission (not a feature for power users only)
          required: true
